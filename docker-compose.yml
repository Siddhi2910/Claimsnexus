version: "3.9"

services:
  api:
    build: .
    container_name: claimsnexus_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      weaviate:
        condition: service_started
    volumes:
      - .:/app
    command: >
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      --reload-exclude ".venv" --reload-exclude "**/site-packages/**"
      --reload-exclude "__pycache__"
    networks:
      - claimsnexus_net

  postgres:
    image: postgres:16-alpine
    container_name: claimsnexus_postgres
    environment:
      POSTGRES_DB: claimsnexus
      POSTGRES_USER: claimsnexus
      POSTGRES_PASSWORD: claimsnexus_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claimsnexus"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - claimsnexus_net

  redis:
    image: redis:7-alpine
    container_name: claimsnexus_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - claimsnexus_net

  weaviate:
    image: semitechnologies/weaviate:1.24.6
    container_name: claimsnexus_weaviate
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: "node1"
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - claimsnexus_net

volumes:
  postgres_data:
  weaviate_data:

networks:
  claimsnexus_net:
    driver: bridge
